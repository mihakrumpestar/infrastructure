version: "3"

includes:
  secrets:
    taskfile: ../infrastructure-secrets/Taskfile.yml
    dir: ../infrastructure-secrets
    flatten: true

tasks:
  ci:
    cmds:
      - gitleaks dir --redact && gitleaks git --redact
      - treefmt
      - deadnix --fail
      - statix check

  update:
    desc: |
      Can also update a specific input with: task update -- opencode
    cmds:
      - nix flake update --flake 'path:{{.ROOT_DIR}}' {{.CLI_ARGS}}

  update-secrets:
    desc: Update secrets
    cmds:
      - task update -- infrastructure-secrets

  generations:
    desc: List generations
    cmds:
      - nixos-rebuild list-generations

  check-reproducibility:
    desc: |
      Bitwise reproducibility check for a host toplevel.
      Builds twice in independent stores (local + persistent temp store),
      rsyncs build1 out of store, diffoscope compares (sole ground truth).
      Use SOURCE=true to block binary cache (force source rebuild).
      Options: -- HOST=personal-workstation SOURCE=true
    cmds:
      - bash scripts/check_reproducibility.sh --host {{.HOST | default "personal-workstation"}} {{if eq .SOURCE "true"}}--force-source-rebuild{{end}}

  clean:
    desc: Clean garbage older than 10d
    cmds:
      - sudo nix-collect-garbage --delete-older-than 10d

  generate:
    desc: |
      Build all hosts, show closure sizes, eval benchmarks, and update dependency graph.
      Use --runs N for eval statistics: task generate -- --runs 3
      Use --hosts h1 h2 for specific hosts: task generate -- --hosts kiosk pi4
    cmds:
      - python3 scripts/flake_stats.py --runs 5 {{.CLI_ARGS}}
      - task: generate-flake-graph

  generate-flake-graph:
    desc: Generate flake graph
    cmd: python3 scripts/flake_graph.py
