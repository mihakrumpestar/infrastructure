version: "3"

includes:
  secrets:
    taskfile: infrastructure-secrets/Taskfile.yml
    dir: infrastructure-secrets
    flatten: true

tasks:
  tidy:
    cmds:
      - alejandra --check --exclude ./.devbox --exclude ./infrastructure-secrets
        ./
      - deadnix --exclude ./infrastructure-secrets --no-underscore
      - statix check

  update:
    desc: |
      Can also update a specific input with: task update -- opencode
    cmds:
      - nix flake update --flake 'path:{{.ROOT_DIR}}' {{.CLI_ARGS}}

  generations:
    cmds:
      - sudo nix-env --list-generations --profile /nix/var/nix/profiles/system

  clean:
    cmds:
      - sudo nix-collect-garbage --delete-older-than 10d

  generate:
    desc: |
      Build all hosts, show closure sizes, and update dependency graph.
      Use --runs N for averaging: task generate -- --runs 5
      Use --workers N to limit parallelism: task generate -- --workers 2
    cmds:
      - python3 scripts/generate_stats.py --runs 5 --workers 1 {{.CLI_ARGS}}
      - python3 scripts/generate_deps.py

  generate-deps:
    desc: Generate dependency graph of Nix files.
    cmd: python3 scripts/generate_deps.py
